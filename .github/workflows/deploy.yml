# .github/workflows/deploy.yml
# 星落之书 — GitHub Pages 自动部署
# 仓库根 = herness/, 游戏文件在 ai-vn-game/ 子目录

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'ai-vn-game/**'
      - 'index.html'
      - 'src/**'
      - 'assets/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: "📦 Build & Deploy"
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://chfr19820610-cell.github.io/ai-vn-game/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Deploy Directory
        run: |
          mkdir -p _deploy

          echo "=== 从根目录复制 ==="
          cp -v index.html _deploy/ 2>/dev/null || echo "⚠ index.html not in root"
          cp -v manifest.json _deploy/ 2>/dev/null || true
          cp -v sw.js _deploy/ 2>/dev/null || true
          cp -v README.md _deploy/ 2>/dev/null || true
          cp -rv src _deploy/ 2>/dev/null || true
          cp -rv assets _deploy/ 2>/dev/null || true

          echo "=== 从 ai-vn-game/ 复制 ==="
          cd ai-vn-game
          cp -v index.html ../_deploy/ 2>/dev/null || echo "  (overwrite with game index)"

          # 核心游戏文件
          for f in \
            v2-story-natural-v2.html \
            v2-story-natural.html \
            v2-story.html \
            v2-full.html \
            v3.html \
            v2.html \
            analytics-dashboard.html \
            itchio-store.html \
            offline.html \
            index-audio.html \
            minimal.html; do
            if [ -f "$f" ]; then
              cp -v "$f" ../_deploy/
            fi
          done

          cp -v manifest.json ../_deploy/ 2>/dev/null || true
          cp -v sw.js ../_deploy/ 2>/dev/null || true
          cp -v README.md ../_deploy/ 2>/dev/null || true
          cp -rv src ../_deploy/ 2>/dev/null || true
          cp -rv assets ../_deploy/ 2>/dev/null || true
          cp -rv locales ../_deploy/ 2>/dev/null || true

          cd ..
          touch _deploy/.nojekyll
          echo ""
          echo "=== _deploy 文件列表 ==="
          ls -la _deploy/
          echo ""
          echo "=== HTML 文件数: $(ls _deploy/*.html 2>/dev/null | wc -l) ==="

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_deploy
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "🚀 Deploy ${{ github.sha }} [skip ci]"
